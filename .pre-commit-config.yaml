exclude: |
    (?x)^(
        docs/.*|
    )$
repos:
-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.3
    hooks:
    -   id: ruff
        args: [--fix]
    -   id: ruff-format

-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v1.18.2'
    hooks:
    -   id: mypy
        files: src/
        args: [--ignore-missing-imports, --warn-unused-ignores]