site_name: ECI Documentation
site_url: https://centre-for-humanities-computing.github.io/european-city-inference/
repo_url: https://github.com/centre-for-humanities-computing/european-city-inference
repo_name: centre-for-humanities-computing/european-city-inference
edit_uri: edit/main/docs/
site_description: "Agent-based political election simulator with hierarchical Bayesian voters"
site_author: Sylvain Estebe

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/centre-for-humanities-computing/european-city-inference

plugins:
  - search
  - mkdocs-jupyter:
      include_source: True
      ignore_h1_titles: True
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy      # Transforme le texte en tableaux structurés
            show_source: true           # Bouton "voir le code source"
            show_root_heading: true     # Nom de la classe en gros titre
            show_category_heading: true # Sépare "Attributes", "Methods", "Classes"
            show_signature_annotations: true
            separate_signature: true
            unwrap_annotated: true
            merge_init_into_class: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Glossary: glossary.md
  - Tutorials:
      - Decision Making: tutorials/tutorial_1_decision_making.ipynb
      - Voting Systems: tutorials/tutorial_2_voting_system.ipynb
      - Environment: tutorials/tutorial_3_environment.ipynb
  - Extending ECI:
      - Write your own response function: extending_response_functions.md
  - API Reference: api.md
  - Algorithms: algorithms.md
  - Contributing: CONTRIBUTING.md
  - Changelog: CHANGELOG.md
